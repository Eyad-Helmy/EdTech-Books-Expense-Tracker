{% extends "base.html" %}

{% block title %}Register{% endblock %}

{% block content %}
    <h2>Register</h2>
    <form method="post" action="{% url 'register' %}">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="form-actions">
            <button class="button" type="submit">Register</button>
        </div>
    </form>
    <p>Already have an account? <a href="{% url 'login' %}">Login here</a>.</p>
{% endblock %}
