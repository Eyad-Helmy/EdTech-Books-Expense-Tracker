{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
    <h2>Login</h2>
    <form method="post" action="{% url 'login' %}">     <!--they can operate without the action att if the same view handles both POST and GET-->
        {% csrf_token %}
        {{ form.as_p }}
        <div class="form-actions">
            <button class="button" type="submit">Login</button>
        </div>
    </form>
    <p>Need an account? <a href="{% url 'register' %}">Register here</a>.</p>
{% endblock %}
