<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Expense Tracker{% endblock %}</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f7f7f7; }
        header, .container { width: 100%; max-width: 960px; margin: 0 auto; padding: 20px; }
        header { background: #2d6cdf; color: white; }
        nav a { color: white; text-decoration: none; margin-right: 16px; }
        .content { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 10px rgba(0,0,0,.05); }
        .messages { list-style: none; padding: 0; margin: 0 0 16px; }
        .messages li { padding: 10px 12px; margin-bottom: 8px; border-radius: 4px; }
        .messages li.info { background: #e8f0fe; color: #1f4db0; }
        .messages li.success { background: #e6f4ea; color: #1f5d35; }
        .messages li.error { background: #fdecea; color: #991b1b; }
        .form-actions { margin-top: 16px; }
        .button { display: inline-block; padding: 10px 16px; border-radius: 4px; background: #2d6cdf; color: white; text-decoration: none; }
    </style>
</head>
<body>
<header>
    <div class="container">
        <h1>Expense Tracker</h1>
        {% include "navbar.html" %}
    </div>
</header>
<main class="container">
    {% if messages %}
        <ul class="messages">
            {% for message in messages %}
                <li class="{{ message.tags }}">{{ message }}</li>
            {% endfor %}
        </ul>
    {% endif %}
    <div class="content">
        {% block content %}{% endblock %}
    </div>
</main>
</body>
</html>
